<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" role="img" aria-labelledby="title desc">
  <title id="title">LakeShore Lawn Care service area map</title>
  <desc id="desc">Stylized map highlighting Muskegon, Whitehall, Ferrysburg, Spring Lake Township, and nearby West Michigan service areas.</desc>
  <defs>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#7bcadd"/>
      <stop offset="1" stop-color="#5fb5ca"/>
    </linearGradient>
    <linearGradient id="land" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#d6f0d7"/>
      <stop offset="1" stop-color="#bce1c0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0a2618" flood-opacity=".24"/>
    </filter>
    <style>
      .road{fill:none;stroke:#7c91a9;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;opacity:.72}
      .minor{fill:none;stroke:#8fb99f;stroke-width:2;opacity:.48}
      .label{font-family:Arial,Helvetica,sans-serif;font-size:22px;font-weight:800;fill:#163b28}
      .small{font-size:17px;font-weight:700;fill:#42654a}
      .pinText{font-family:Arial,Helvetica,sans-serif;font-size:18px;font-weight:900;fill:#fff}
    </style>
  </defs>

  <rect width="960" height="640" rx="28" fill="#f6f2e5"/>
  <path d="M0 0h286c-23 54-18 102 12 151 24 39 16 80-18 120-33 39-51 81-37 129 18 61-7 112-35 162-14 25-23 51-23 78H0z" fill="url(#water)"/>
  <path d="M240 0h720v640H185c0-60 42-112 39-169-3-54-47-82-40-139 5-44 49-73 61-116 13-47-18-83-24-128-5-34 4-64 19-88z" fill="url(#land)"/>

  <path class="minor" d="M342 0v640M460 0v640M582 0v640M704 0v640M826 0v640M210 72h750M190 170h770M210 270h750M196 382h764M186 500h774"/>
  <path class="road" d="M318 30c38 102 30 190-22 263-43 62-31 143 46 207"/>
  <path class="road" d="M205 306c127 8 252 2 375-18 94-15 187-18 280-4"/>
  <path class="road" d="M284 493c89-38 169-42 239-12 80 34 167 35 262 4"/>
  <path class="road" d="M408 526c22-74 24-144 8-210-17-72 7-128 72-166"/>

  <ellipse cx="327" cy="316" rx="205" ry="154" fill="#75a942" opacity=".2"/>
  <ellipse cx="327" cy="316" rx="153" ry="106" fill="#75a942" opacity=".2"/>
  <path d="M153 326c62-84 115-139 206-160 89-20 166 24 211 95 46 72 38 147-34 209-77 66-194 82-285 34-84-45-127-112-98-178z" fill="#75a942" opacity=".22"/>
  <path d="M153 326c62-84 115-139 206-160 89-20 166 24 211 95 46 72 38 147-34 209-77 66-194 82-285 34-84-45-127-112-98-178z" fill="none" stroke="#2f6f3d" stroke-width="5" stroke-dasharray="12 10" opacity=".9"/>

  <g filter="url(#softShadow)">
    <rect x="560" y="66" width="314" height="132" rx="18" fill="#fffdf7"/>
    <text x="588" y="112" class="label">Where we work</text>
    <text x="588" y="146" class="small">Muskegon, Whitehall, Ferrysburg,</text>
    <text x="588" y="172" class="small">Spring Lake Township, and nearby towns.</text>
  </g>

  <g transform="translate(294 292)">
    <circle r="18" fill="#143c27"/>
    <circle r="7" fill="#dff29b"/>
    <text x="28" y="8" class="label">Muskegon</text>
  </g>
  <g transform="translate(284 188)">
    <circle r="14" fill="#2f6f3d"/>
    <circle r="5" fill="#dff29b"/>
    <text x="24" y="7" class="small">North Muskegon</text>
  </g>
  <g transform="translate(252 502)">
    <circle r="16" fill="#2f6f3d"/>
    <circle r="6" fill="#dff29b"/>
    <text x="-8" y="38" class="small">Ferrysburg</text>
  </g>
  <g transform="translate(333 516)">
    <circle r="16" fill="#2f6f3d"/>
    <circle r="6" fill="#dff29b"/>
    <text x="18" y="34" class="small">Spring Lake</text>
  </g>
  <g transform="translate(323 84)">
    <circle r="15" fill="#2f6f3d"/>
    <circle r="6" fill="#dff29b"/>
    <text x="25" y="7" class="label">Whitehall</text>
  </g>
  <g transform="translate(420 420)">
    <circle r="13" fill="#75a942"/>
    <text x="22" y="6" class="small">Fruitport</text>
  </g>
  <g transform="translate(512 310)">
    <circle r="13" fill="#75a942"/>
    <text x="22" y="6" class="small">Wolf Lake</text>
  </g>

  <g transform="translate(64 548)">
    <rect width="250" height="52" rx="12" fill="#143c27"/>
    <text x="22" y="33" class="pinText">LakeShore service area</text>
  </g>
</svg>
